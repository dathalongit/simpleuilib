name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Không cancel deploy đang chạy — tránh lỗi "Deployment failed" do trùng request
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library + showcase
        run: |
          pnpm --filter react-headless-quiz build
          pnpm --filter showcase-demo build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Verify build output
        run: test -f examples/showcase-demo/dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/showcase-demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true

      - name: Wait for in-flight deployment to settle
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (retry)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Fail if deploy did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome != 'success'
        run: |
          echo "Pages deploy failed. Check Settings → Pages → Source = GitHub Actions."
          exit 1
